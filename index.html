<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus-Aegis</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap');

:root {
  --bg: #0d0d12;
  --surface: #13131a;
  --border: #1e1e2e;
  --accent: #6c63ff;
  --accent2: #c084fc;
  --accent3: #38bdf8;
  --accent4: #34d399;
  --text: #e8e8f4;
  --muted: #52527a;
  --red: #f87171;
  --grad: linear-gradient(135deg, #6c63ff, #c084fc);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'IBM Plex Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── CANVAS WAVES ── */
#waveCanvas {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  opacity: 0.28;
}

/* ── DIGICODE ── */
#lock {
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at 50% 40%, #1a1030 0%, var(--bg) 70%);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 28px;
  z-index: 999;
  transition: opacity .45s ease;
}

.lock-brand {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 30px;
  font-weight: 600;
  background: linear-gradient(135deg, #6c63ff 0%, #c084fc 50%, #38bdf8 100%);
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: gradShift 3s linear infinite;
  letter-spacing: -0.02em;
}

@keyframes gradShift {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.lock-title {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.35em;
  color: var(--muted);
  text-transform: uppercase;
}

.dots { display: flex; gap: 14px; }

.dot {
  width: 12px; height: 12px;
  border-radius: 50%;
  border: 1.5px solid var(--muted);
  transition: all .25s cubic-bezier(.34,1.56,.64,1);
}
.dot.filled {
  background: var(--grad);
  border-color: transparent;
  box-shadow: 0 0 12px #6c63ff88;
  transform: scale(1.2);
}
.dot.error { background: var(--red); border-color: var(--red); box-shadow: 0 0 12px #f8717188; }

.numpad {
  display: grid;
  grid-template-columns: repeat(3, 60px);
  gap: 10px;
}

.key {
  width: 60px; height: 60px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  color: var(--text);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 20px;
  border-radius: 50%;
  cursor: pointer;
  transition: all .18s;
  position: relative;
  overflow: hidden;
}
.key::after {
  content: '';
  position: absolute; inset: 0;
  border-radius: 50%;
  background: var(--grad);
  opacity: 0;
  transition: opacity .18s;
}
.key:hover { border-color: var(--accent); box-shadow: 0 0 0 4px #6c63ff1e; }
.key:hover::after { opacity: 0.09; }
.key:active { transform: scale(.9); }
.key:active::after { opacity: 0.24; }
.key.del { font-size: 16px; color: var(--muted); }
.key.del:hover { color: var(--red); border-color: var(--red); box-shadow: 0 0 0 3px #f8717122; }

/* ── APP ── */
#app {
  display: none;
  position: relative;
  z-index: 1;
  max-width: 800px;
  margin: 0 auto;
  padding: 48px 24px 80px;
  animation: fadeUp .55s ease both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

.header {
  display: flex; align-items: baseline; gap: 12px;
  margin-bottom: 4px;
}

h1 {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 26px;
  font-weight: 600;
  background: linear-gradient(135deg, #6c63ff 0%, #c084fc 50%, #38bdf8 100%);
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: gradShift 3s linear infinite;
  letter-spacing: -0.02em;
}

.count-badge {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 2px 10px;
}

.subtitle {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 28px;
}

/* ── SEARCH ── */
.search-bar {
  position: relative;
  margin-bottom: 24px;
}
.search-bar input {
  width: 100%;
  padding: 12px 16px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 14px;
  outline: none;
  transition: border-color .2s, box-shadow .2s;
}
.search-bar input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px #6c63ff1a;
}
.search-bar input::placeholder { color: var(--muted); }

/* ── TABLE ── */
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
thead th {
  text-align: left;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--muted);
  padding: 0 12px 12px;
  border-bottom: 1px solid var(--border);
}
tbody tr {
  border-bottom: 1px solid #15151f;
  transition: background .15s;
  animation: rowIn .3s ease both;
}
@keyframes rowIn {
  from { opacity: 0; transform: translateX(-6px); }
  to   { opacity: 1; transform: translateX(0); }
}
tbody tr:hover { background: #141420; }
tbody td { padding: 11px 12px; vertical-align: middle; }

.num {
  font-family: 'IBM Plex Mono', monospace;
  color: var(--muted);
  font-size: 11px;
  width: 36px;
}
.name { font-weight: 500; color: var(--text); }

.code {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  border-radius: 5px;
  padding: 2px 8px;
  display: inline-block;
  width: 46px;
  text-align: center;
  font-weight: 600;
}
.code-0 { background: #1a1030; color: #a78bfa; border: 1px solid #3d2a70; }
.code-1 { background: #0f1f30; color: #38bdf8; border: 1px solid #1a4060; }
.code-2 { background: #0f2020; color: #34d399; border: 1px solid #1a4040; }
.code-3 { background: #201510; color: #fb923c; border: 1px solid #50301a; }
.code-4 { background: #20101a; color: #f472b6; border: 1px solid #50203a; }
.code-5 { background: #1a1010; color: #f87171; border: 1px solid #502020; }
.code-6 { background: #181820; color: #e2e8f0; border: 1px solid #303050; }
.code-7 { background: #1a1a10; color: #facc15; border: 1px solid #504010; }
.code-8 { background: #0f1a1f; color: #67e8f9; border: 1px solid #1a3f4a; }
.code-9 { background: #1a1028; color: #c084fc; border: 1px solid #40186a; }

/* ── BOUTONS LIGNE ── */
.btn-open {
  padding: 5px 14px;
  background: linear-gradient(135deg, #6c63ff, #a855f7);
  border: none;
  border-radius: 6px;
  color: #fff;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  cursor: pointer;
  transition: filter .15s, transform .15s;
  margin-right: 6px;
}
.btn-open:hover { filter: brightness(1.15); transform: scale(1.04); }

.btn-lock {
  padding: 5px 10px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--muted);
  font-size: 13px;
  cursor: pointer;
  transition: all .15s;
}
.btn-lock:hover { border-color: var(--accent3); color: var(--accent3); background: #0f1f2a; }

.no-results {
  text-align: center;
  padding: 48px;
  color: var(--muted);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 13px;
}

/* ── SEPARATOR ── */
.sep {
  border: none;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border), transparent);
  margin: 44px 0;
}

/* ── CONVERTER ── */
.conv-title {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--accent2);
  margin-bottom: 16px;
}
.conv-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}
@media (max-width: 540px) { .conv-grid { grid-template-columns: 1fr; } }
.conv-box label {
  font-size: 11px;
  color: var(--muted);
  font-family: 'IBM Plex Mono', monospace;
  display: block;
  margin-bottom: 6px;
}
.conv-box textarea {
  width: 100%;
  height: 80px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  padding: 10px;
  resize: none;
  outline: none;
  transition: border-color .2s, box-shadow .2s;
}
.conv-box textarea:focus {
  border-color: var(--accent2);
  box-shadow: 0 0 0 3px #c084fc18;
}
.conv-actions { display: flex; gap: 8px; margin-top: 12px; }
.btn {
  padding: 8px 18px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  border-radius: 7px;
  border: 1.5px solid var(--border);
  cursor: pointer;
  transition: all .15s;
}
.btn-enc { background: linear-gradient(135deg, #6c63ff, #a855f7); color: #fff; border-color: transparent; }
.btn-enc:hover { filter: brightness(1.15); }
.btn-dec { background: transparent; color: var(--accent3); border-color: var(--accent3); }
.btn-dec:hover { background: #0f1f30; }
.btn-clear { background: transparent; color: var(--muted); }
.btn-clear:hover { color: var(--red); border-color: var(--red); }

/* ── MODAL ── */
#modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: #00000090;
  backdrop-filter: blur(8px);
  z-index: 500;
  align-items: center;
  justify-content: center;
}
#modal-overlay.open { display: flex; }

.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 36px 32px 28px;
  width: 300px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 18px;
  position: relative;
  animation: modalIn .3s cubic-bezier(.34,1.56,.64,1);
}
@keyframes modalIn {
  from { opacity: 0; transform: scale(.86) translateY(10px); }
  to   { opacity: 1; transform: scale(1)   translateY(0); }
}

.modal-close {
  position: absolute; top: 12px; right: 14px;
  background: none; border: none;
  color: var(--muted); font-size: 18px;
  cursor: pointer; transition: color .15s;
  line-height: 1;
}
.modal-close:hover { color: var(--text); }

.modal-heading {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--muted);
  align-self: flex-start;
}

/* modal dots */
.m-dots { display: flex; gap: 12px; }
.m-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  border: 1.5px solid var(--muted);
  transition: all .25s cubic-bezier(.34,1.56,.64,1);
}
.m-dot.filled {
  background: linear-gradient(135deg, var(--accent3), var(--accent4));
  border-color: transparent;
  box-shadow: 0 0 10px #38bdf855;
  transform: scale(1.2);
}
.m-dot.error { background: var(--red); border-color: var(--red); }

/* modal numpad */
.m-numpad {
  display: grid;
  grid-template-columns: repeat(3, 52px);
  gap: 8px;
}
.m-key {
  width: 52px; height: 52px;
  border-radius: 50%;
  background: var(--bg);
  border: 1.5px solid var(--border);
  color: var(--text);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 18px;
  cursor: pointer;
  transition: all .15s;
}
.m-key:hover { border-color: var(--accent3); box-shadow: 0 0 0 3px #38bdf81a; }
.m-key:active { transform: scale(.9); }
.m-key.mdel { font-size: 13px; color: var(--muted); }
.m-key.mdel:hover { color: var(--red); border-color: var(--red); }

/* info panel */
.info-panel {
  display: none;
  width: 100%;
  flex-direction: column;
  gap: 10px;
  animation: fadeUp .3s ease;
}
.info-panel.open { display: flex; }

.info-row { display: flex; flex-direction: column; gap: 2px; }
.info-lbl {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--muted);
}
.info-val {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
}
.info-val.sub {
  font-size: 12px;
  font-weight: 400;
  color: var(--muted);
  font-family: 'IBM Plex Mono', monospace;
}
.info-val.grad {
  background: linear-gradient(135deg, var(--accent3), var(--accent4));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.info-open-btn {
  width: 100%;
  padding: 10px;
  margin-top: 4px;
  background: linear-gradient(135deg, #6c63ff, #a855f7);
  border: none;
  border-radius: 8px;
  color: #fff;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  cursor: pointer;
  transition: filter .15s;
}
.info-open-btn:hover { filter: brightness(1.15); }
</style>
</head>
<body>

<canvas id="waveCanvas"></canvas>

<!-- ══ DIGICODE ══ -->
<div id="lock">
  <div class="lock-brand">Nexus-Aegis</div>
  <div class="lock-title">Accès sécurisé</div>
  <div class="dots">
    <div class="dot" id="d0"></div>
    <div class="dot" id="d1"></div>
    <div class="dot" id="d2"></div>
    <div class="dot" id="d3"></div>
  </div>
  <div class="numpad">
    <button class="key" onclick="pressKey('1')">1</button>
    <button class="key" onclick="pressKey('2')">2</button>
    <button class="key" onclick="pressKey('3')">3</button>
    <button class="key" onclick="pressKey('4')">4</button>
    <button class="key" onclick="pressKey('5')">5</button>
    <button class="key" onclick="pressKey('6')">6</button>
    <button class="key" onclick="pressKey('7')">7</button>
    <button class="key" onclick="pressKey('8')">8</button>
    <button class="key" onclick="pressKey('9')">9</button>
    <button class="key del" onclick="delKey()">⌫</button>
    <button class="key" onclick="pressKey('0')">0</button>
    <button class="key" style="visibility:hidden"></button>
  </div>
</div>

<!-- ══ APP ══ -->
<div id="app">
  <div class="header">
    <h1>Nexus-Aegis</h1>
    <span class="count-badge" id="countBadge">0 sites</span>
  </div>
  <p class="subtitle">Base de liens — Classe 208</p>

  <div class="search-bar">
    <input type="text" id="search" placeholder="Rechercher un nom, un mot-clé, ou un code XXX…" oninput="filterSites()">
  </div>

  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Nom</th>
        <th>Code</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>

  <hr class="sep">

  <div class="conv-title">↔ Convertisseur Base64</div>
  <div class="conv-grid">
    <div class="conv-box">
      <label>URL / Texte brut</label>
      <textarea id="rawInput" placeholder="https://exemple.com"></textarea>
    </div>
    <div class="conv-box">
      <label>Base64</label>
      <textarea id="b64Input" placeholder="aHR0cHM6Ly9leGVtcGxlLmNvbQ=="></textarea>
    </div>
  </div>
  <div class="conv-actions">
    <button class="btn btn-enc" onclick="encode()">Encoder →</button>
    <button class="btn btn-dec" onclick="decode()">← Décoder</button>
    <button class="btn btn-clear" onclick="clearConv()">Effacer</button>
  </div>
</div>

<!-- ══ MODAL CADENAS ══ -->
<div id="modal-overlay">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-heading" id="modal-heading">Code d'accès</div>

    <div id="m-code-panel" style="display:flex;flex-direction:column;align-items:center;gap:16px;width:100%">
      <div class="m-dots">
        <div class="m-dot" id="md0"></div>
        <div class="m-dot" id="md1"></div>
        <div class="m-dot" id="md2"></div>
        <div class="m-dot" id="md3"></div>
      </div>
      <div class="m-numpad">
        <button class="m-key" onclick="mKey('1')">1</button>
        <button class="m-key" onclick="mKey('2')">2</button>
        <button class="m-key" onclick="mKey('3')">3</button>
        <button class="m-key" onclick="mKey('4')">4</button>
        <button class="m-key" onclick="mKey('5')">5</button>
        <button class="m-key" onclick="mKey('6')">6</button>
        <button class="m-key" onclick="mKey('7')">7</button>
        <button class="m-key" onclick="mKey('8')">8</button>
        <button class="m-key" onclick="mKey('9')">9</button>
        <button class="m-key mdel" onclick="mDel()">⌫</button>
        <button class="m-key" onclick="mKey('0')">0</button>
        <button class="m-key" style="visibility:hidden"></button>
      </div>
    </div>

    <div class="info-panel" id="info-panel">
      <div class="info-row">
        <span class="info-lbl">Nom</span>
        <span class="info-val grad" id="i-nom">—</span>
      </div>
      <div class="info-row">
        <span class="info-lbl">Numéro</span>
        <span class="info-val" id="i-num">—</span>
      </div>
      <div class="info-row">
        <span class="info-lbl">Code</span>
        <span class="info-val" id="i-code">—</span>
      </div>
      <div class="info-row">
        <span class="info-lbl">Description</span>
        <span class="info-val sub" id="i-desc">Non renseigné</span>
      </div>
      <div class="info-row">
        <span class="info-lbl">Date</span>
        <span class="info-val sub" id="i-date">Non renseigné</span>
      </div>
      <button class="info-open-btn" onclick="openFromModal()">Ouvrir le lien →</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════
//  DONNÉES
//  Ajouter un site : copier une ligne et remplir
//  b64  → coller le résultat du convertisseur
//  desc → description (optionnel)
//  date → date ajout   (optionnel)
// ══════════════════════════════════════════
const sites = [
  { num:  1, nom: "Base 208",          b64: "aHR0cHM6Ly9uYXRsYWNheGkuZ2l0aHViLmlvL2Jhc2UtY291cnMtMjA4Lw==",                                             code: "100", desc: "Non renseigné", date: "Non renseigné" },
  { num:  2, nom: "Français",          b64: "aHR0cHM6Ly9uYXRsYWNheGkuZ2l0aHViLmlvL2ZyYW5jYWlzLWNvdXJzLTIwOC8=",                                        code: "101", desc: "Non renseigné", date: "Non renseigné" },
  { num:  3, nom: "Synthèse",          b64: "aHR0cHM6Ly9ldmFubG9wZXowNjMwMC1sZ3RtLmdpdGh1Yi5pby9mcmFuY2Fpcy0yMDgv",                                    code: "102", desc: "Non renseigné", date: "Non renseigné" },
  { num:  4, nom: "Textes",            b64: "aHR0cHM6Ly9uYXRsYWNheGkuZ2l0aHViLmlvL3RleHRlLWZyYW5jYWlzLTIwOC8=",                                        code: "103", desc: "Non renseigné", date: "Non renseigné" },
  { num:  5, nom: "Anglais LV1",       b64: "aHR0cHM6Ly9uYXRsYWNheGkuZ2l0aHViLmlvL2FuZ2xhaXMtY291cnMtMjA4Lw==",                                        code: "104", desc: "Non renseigné", date: "Non renseigné" },
  { num:  6, nom: "Padlet Anglais",    b64: "aHR0cHM6Ly9wYWRsZXQuY29tL2NoYWlsbGFuX2FuZ2xhaXMvY2xhc3Nlcy1kZS1zZWNvbmRlLTIwMjUtMjAyNi03NnZqcnE2bjd4cXUxNWdwcQ==", code: "105", desc: "Non renseigné", date: "Non renseigné" },
  { num:  7, nom: "Russe LV3",         b64: "aHR0cHM6Ly9uYXRsYWNheGkuZ2l0aHViLmlvL3J1c3NlLWNvdXJzLTIwOC8=",                                            code: "106", desc: "Non renseigné", date: "Non renseigné" },

// ── WAVES ──────────────────────────────────
const canvas = document.getElementById("waveCanvas");
const ctx    = canvas.getContext("2d");
let W, H, tick = 0;

const WAVES = [
  { amp: 48, freq: 0.011, speed: 0.28, yRatio: 0.20, color: "#6c63ff" },
  { amp: 36, freq: 0.016, speed: 0.18, yRatio: 0.40, color: "#c084fc" },
  { amp: 52, freq: 0.009, speed: 0.22, yRatio: 0.58, color: "#38bdf8" },
  { amp: 30, freq: 0.020, speed: 0.15, yRatio: 0.74, color: "#34d399" },
  { amp: 42, freq: 0.013, speed: 0.20, yRatio: 0.88, color: "#f472b6" },
];

function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
window.addEventListener("resize", resize);
resize();

(function loop() {
  ctx.clearRect(0, 0, W, H);
  WAVES.forEach(w => {
    ctx.beginPath();
    for (let x = 0; x <= W; x += 2) {
      const y = w.yRatio * H + Math.sin(x * w.freq + tick * w.speed) * w.amp;
      x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.strokeStyle = w.color;
    ctx.lineWidth   = 1.4;
    ctx.globalAlpha = 0.55;
    ctx.stroke();
  });
  ctx.globalAlpha = 1;
  tick += 0.04;
  requestAnimationFrame(loop);
})();

// ── DIGICODE PRINCIPAL ──────────────────────
const MAIN_CODE = "1710";
let mainIn = "";

function pressKey(k) {
  if (mainIn.length >= 4) return;
  mainIn += k;
  updateDots(false);
  if (mainIn.length === 4) setTimeout(checkMain, 80);
}
function delKey() { mainIn = mainIn.slice(0, -1); updateDots(false); }

function updateDots(err) {
  for (let i = 0; i < 4; i++) {
    const d = document.getElementById("d" + i);
    d.className = "dot";
    if (err)              d.classList.add("error");
    else if (i < mainIn.length) d.classList.add("filled");
  }
}

function checkMain() {
  if (mainIn === MAIN_CODE) {
    const lock = document.getElementById("lock");
    lock.style.opacity = "0";
    setTimeout(() => {
      lock.style.display = "none";
      document.getElementById("app").style.display = "block";
      renderTable(sites);
      document.getElementById("countBadge").textContent = sites.length + " site" + (sites.length > 1 ? "s" : "");
    }, 450);
  } else {
    updateDots(true);
    setTimeout(() => { mainIn = ""; updateDots(false); }, 700);
  }
}

document.addEventListener("keydown", e => {
  if (document.getElementById("lock").style.display !== "none") {
    if (e.key >= "0" && e.key <= "9") pressKey(e.key);
    if (e.key === "Backspace") delKey();
  }
});

// ── TABLE ───────────────────────────────────
function db64(b) { try { return atob(b); } catch { return "#"; } }

function codeClass(c) { return "code code-" + (parseInt(c[0]) || 0); }

function renderTable(data) {
  const tb = document.getElementById("tbody");
  if (!data.length) {
    tb.innerHTML = '<tr><td colspan="4" class="no-results">Aucun résultat</td></tr>';
    return;
  }
  tb.innerHTML = data.map((s, i) => `
    <tr style="animation-delay:${i * 0.03}s">
      <td class="num">${String(s.num).padStart(2,"0")}</td>
      <td class="name">${s.nom}</td>
      <td><span class="${codeClass(s.code)}">${s.code}</span></td>
      <td>
        <button class="btn-open" onclick="openSite('${s.b64}')">Ouvrir</button>
        <button class="btn-lock" title="Infos" onclick="openModal(${s.num})">🔒</button>
      </td>
    </tr>`).join("");
}

function filterSites() {
  const q = document.getElementById("search").value.trim().toLowerCase();
  if (!q) { renderTable(sites); return; }
  if (/^\d{3}$/.test(q)) {
    renderTable(sites.filter(s => s.code === q));
  } else {
    renderTable(sites.filter(s => s.nom.toLowerCase().includes(q)));
  }
}

function openSite(b64) {
  const url = db64(b64);
  if (url && url !== "#") window.open(url, "_blank");
}

// ── MODAL CADENAS ───────────────────────────
const MODAL_CODE = "8957";
let mIn = "", currentNum = null;

function openModal(num) {
  currentNum = num;
  mIn = "";
  updateMDots(false);
  document.getElementById("m-code-panel").style.display = "flex";
  document.getElementById("info-panel").classList.remove("open");
  document.getElementById("modal-heading").textContent = "Code d'accès";
  document.getElementById("modal-overlay").classList.add("open");
}
function closeModal() {
  document.getElementById("modal-overlay").classList.remove("open");
  currentNum = null; mIn = "";
}

function mKey(k) {
  if (mIn.length >= 4) return;
  mIn += k;
  updateMDots(false);
  if (mIn.length === 4) setTimeout(checkModal, 80);
}
function mDel() { mIn = mIn.slice(0, -1); updateMDots(false); }

function updateMDots(err) {
  for (let i = 0; i < 4; i++) {
    const d = document.getElementById("md" + i);
    d.className = "m-dot";
    if (err)           d.classList.add("error");
    else if (i < mIn.length) d.classList.add("filled");
  }
}

function checkModal() {
  if (mIn === MODAL_CODE) {
    const s = sites.find(x => x.num === currentNum);
    if (!s) return;
    document.getElementById("m-code-panel").style.display = "none";
    document.getElementById("modal-heading").textContent = "Informations";
    document.getElementById("i-nom").textContent  = s.nom;
    document.getElementById("i-num").textContent  = "#" + String(s.num).padStart(2,"0");
    document.getElementById("i-code").textContent = s.code;
    document.getElementById("i-desc").textContent = s.desc || "Non renseigné";
    document.getElementById("i-date").textContent = s.date || "Non renseigné";
    document.getElementById("info-panel").classList.add("open");
  } else {
    updateMDots(true);
    setTimeout(() => { mIn = ""; updateMDots(false); }, 700);
  }
}

function openFromModal() {
  const s = sites.find(x => x.num === currentNum);
  if (s) { openSite(s.b64); closeModal(); }
}

document.getElementById("modal-overlay").addEventListener("click", e => {
  if (e.target === document.getElementById("modal-overlay")) closeModal();
});

// ── CONVERTISSEUR ───────────────────────────
function encode() {
  document.getElementById("b64Input").value = btoa(unescape(encodeURIComponent(document.getElementById("rawInput").value)));
}
function decode() {
  try { document.getElementById("rawInput").value = decodeURIComponent(escape(atob(document.getElementById("b64Input").value.trim()))); }
  catch { document.getElementById("rawInput").value = "⚠ Base64 invalide"; }
}
function clearConv() {
  document.getElementById("rawInput").value = "";
  document.getElementById("b64Input").value = "";
}
